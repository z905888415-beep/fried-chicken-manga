name: kira
description: "A comic reader app."
publish_to: "none"
version: 1.0.1
environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.8.0+1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  shared_preferences: ^2.3.0
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.17
  flex_color_picker: ^3.8.0
  scrollable_positioned_list: ^0.3.8
  crypto: ^3.0.7
  canvas_danmaku: ^0.3.1
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  screen_brightness: ^2.1.8
  wakelock_plus: ^1.3.3
  system_fonts: ^1.0.1
  flutter_markdown_plus: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/ic_launcher.png"
  android: true
  ios: true
  remove_alpha_ios: true
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - assets/ic_launcher.png
    - assets/github.svg
