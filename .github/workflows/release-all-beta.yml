name: Build & Release (Beta - All Platforms)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "发布版本号 (如 v1.2.0-beta)"
        required: true
        default: "v0.0.0-beta"

env:
  RELEASE_TAG: ${{ github.event.inputs.tag_name }}

jobs:
  build-android:
    name: Build Android APK (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=../upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (arm64-v8a)
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: >
          flutter build apk --release --target-platform android-arm64
          --dart-define=DANDANPLAY_APP_ID="${DANDANPLAY_APP_ID}"
          --dart-define=DANDANPLAY_APP_SECRET="${DANDANPLAY_APP_SECRET}"

      - name: Rename APK
        shell: bash
        run: |
          set -euo pipefail
          cd build/app/outputs/flutter-apk
          mv app-release.apk "kira-${RELEASE_TAG}-arm64-v8a.apk"
          ls -lh kira-*.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/kira-*.apk

  build-windows:
    name: Build Windows (ZIP + Setup)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        shell: pwsh
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          flutter build windows --release `
            --dart-define=DANDANPLAY_APP_ID="$env:DANDANPLAY_APP_ID" `
            --dart-define=DANDANPLAY_APP_SECRET="$env:DANDANPLAY_APP_SECRET"

      - name: Package Windows ZIP
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $src = 'build/windows/x64/runner/Release'
          New-Item -ItemType Directory -Path 'build/windows/dist' -Force | Out-Null
          $out = "build/windows/dist/kira-$tag-windows-x64.zip"
          if (Test-Path $out) { Remove-Item $out -Force }
          Compress-Archive -Path "$src/*" -DestinationPath $out
          Get-Item $out

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = (Get-Command iscc.exe -ErrorAction SilentlyContinue)
          if ($iscc) {
            $path = $iscc.Source
          } else {
            $candidates = @(
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
            )
            $path = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $path) { throw 'ISCC.exe 未找到' }
          Write-Host "ISCC: $path"
          "ISCC_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Generate Inno Setup script & compile
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $version = ($tag -replace '^v','') -replace '-.*$',''
          $icoPath = (Resolve-Path 'windows/runner/resources/app_icon.ico').Path
          $releaseFullPath = (Resolve-Path 'build/windows/x64/runner/Release').Path
          $outputDir = (Resolve-Path 'build/windows/dist').Path
          $outputBase = "kira-$tag-windows-x64-setup"
          $issPath = Join-Path $outputDir 'installer.iss'

          $lines = @(
            '; Auto-generated by release-all-beta workflow.'
            "#define MyAppName `"Kira`""
            "#define MyAppVersion `"$version`""
            "#define MyAppPublisher `"caolib`""
            "#define MyAppExeName `"kira.exe`""
            ''
            '[Setup]'
            'AppId={{8C5A1F2E-7E4B-4F3A-9A1D-KIRA-COMIC-READER}}'
            'AppName={#MyAppName}'
            'AppVersion={#MyAppVersion}'
            'AppVerName={#MyAppName} v{#MyAppVersion}'
            'AppPublisher={#MyAppPublisher}'
            'DefaultDirName={autopf}\{#MyAppName}'
            'DefaultGroupName={#MyAppName}'
            'DisableProgramGroupPage=yes'
            'UninstallDisplayIcon={app}\{#MyAppExeName}'
            "OutputDir=$outputDir"
            "OutputBaseFilename=$outputBase"
            'Compression=lzma2'
            'SolidCompression=yes'
            'WizardStyle=modern'
            'ArchitecturesAllowed=x64compatible'
            'ArchitecturesInstallIn64BitMode=x64compatible'
            'PrivilegesRequired=lowest'
            'PrivilegesRequiredOverridesAllowed=dialog'
            "SetupIconFile=$icoPath"
            ''
            '[Languages]'
            'Name: "english"; MessagesFile: "compiler:Default.isl"'
            ''
            '[Tasks]'
            'Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked'
            'Name: "startmenuicon"; Description: "Create Start Menu shortcut"; GroupDescription: "{cm:AdditionalIcons}"'
            ''
            '[Files]'
            "Source: `"$releaseFullPath\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs createallsubdirs"
            ''
            '[Icons]'
            'Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: startmenuicon'
            'Name: "{group}\{cm:UninstallProgram,{#MyAppName}}"; Filename: "{uninstallexe}"; Tasks: startmenuicon'
            'Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon'
            ''
            '[Run]'
            'Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#MyAppName}}"; Flags: nowait postinstall skipifsilent'
          )

          [System.IO.File]::WriteAllLines($issPath, $lines, [System.Text.Encoding]::UTF8)

          & "$env:ISCC_PATH" $issPath
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed (exit $LASTEXITCODE)" }
          Get-Item (Join-Path $outputDir "$outputBase.exe")

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows
          path: |
            build/windows/dist/kira-*.zip
            build/windows/dist/kira-*setup.exe

  build-macos:
    name: Build macOS (ZIP)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: >
          flutter build macos --release
          --dart-define=DANDANPLAY_APP_ID="${DANDANPLAY_APP_ID}"
          --dart-define=DANDANPLAY_APP_SECRET="${DANDANPLAY_APP_SECRET}"

      - name: Package macOS ZIP
        shell: bash
        run: |
          set -euo pipefail
          APP=$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n1)
          if [ -z "$APP" ]; then echo '未找到 .app'; exit 1; fi
          mkdir -p dist
          OUT="dist/kira-${RELEASE_TAG}-macos.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$OUT"
          ls -lh "$OUT"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos
          path: dist/kira-*.zip

  build-linux:
    name: Build Linux (tar.gz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            mpv libmpv-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: >
          flutter build linux --release
          --dart-define=DANDANPLAY_APP_ID="${DANDANPLAY_APP_ID}"
          --dart-define=DANDANPLAY_APP_SECRET="${DANDANPLAY_APP_SECRET}"

      - name: Package Linux tar.gz
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          OUT="dist/kira-${RELEASE_TAG}-linux-x64.tar.gz"
          tar -czf "$OUT" -C build/linux/x64/release/bundle .
          ls -lh "$OUT"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux
          path: dist/kira-*.tar.gz

  release:
    name: Create Beta Pre-Release
    needs: [build-android, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: docs/CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: List downloaded artifacts
        run: find artifacts -type f -print

      - name: Create GitHub Pre-Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES_ARGS=()
          if [ -f docs/CHANGELOG.md ]; then
            NOTES_ARGS=(--notes-file docs/CHANGELOG.md)
          else
            NOTES_ARGS=(--generate-notes)
          fi
          mapfile -t FILES < <(find artifacts -type f)
          gh release create "$RELEASE_TAG" "${FILES[@]}" \
            --repo="$GITHUB_REPOSITORY" \
            --title="App $RELEASE_TAG (Beta)" \
            --prerelease \
            "${NOTES_ARGS[@]}"
