name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "发布版本号 (如 v0.1.0)"
        required: true
        default: "v0.1.0"

env:
  RELEASE_TAG: ${{ github.ref_name || github.event.inputs.tag_name }}

jobs:
  build-android:
    name: Build Android Split APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

          cat > android/key.properties <<EOF
          storeFile=../upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Validate Android signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          test -s android/upload-keystore.jks
          test -s android/key.properties

          keytool -list -v \
            -keystore android/upload-keystore.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            > /dev/null

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (arm64-v8a)
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: >
          flutter build apk --release --target-platform android-arm64
          --dart-define=DANDANPLAY_APP_ID="${DANDANPLAY_APP_ID}"
          --dart-define=DANDANPLAY_APP_SECRET="${DANDANPLAY_APP_SECRET}"

      - name: Rename APK
        shell: bash
        run: |
          set -euo pipefail
          cd build/app/outputs/flutter-apk
          mv app-release.apk "kira-${RELEASE_TAG}-arm64-v8a.apk"
          ls -lh kira-*.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-split-apks
          path: build/app/outputs/flutter-apk/kira-*.apk

  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: docs/CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download APKs
        uses: actions/download-artifact@v7
        with:
          name: android-split-apks
          path: artifacts/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" artifacts/*.apk \
            --repo="$GITHUB_REPOSITORY" \
            --title="App $RELEASE_TAG" \
            --notes-file docs/CHANGELOG.md
